<!DOCTYPE html>
<html>
<head>
  <title>PeerConnect</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 20px;
    }

    video {
      width: 300px;
      height: 220px;
      border-radius: 15px;
      border: 2px solid white;
      background: black;
    }

    .controls {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .call-btn {
      background-color: #4CAF50;
      color: white;
    }

    .end-btn {
      background-color: red;
      color: white;
    }

    .id-box {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>PeerConnect</h1>
<p>Real-Time Video Communication</p>

<div class="id-box">
  Your ID: <span id="my-id"></span>
</div>

<div class="controls">
  <input type="text" id="peer-id" placeholder="Enter Peer ID">
  <br>
  <button class="call-btn" onclick="callPeer()">Start Call</button>
  <button class="end-btn" onclick="endCall()">End Call</button>
</div>

<div class="container">
  <div>
    <h3>My Video</h3>
    <video id="my-video" autoplay muted></video>
  </div>

  <div>
    <h3>Peer Video</h3>
    <video id="peer-video" autoplay></video>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="app.js"></script>

</body>
</html>

</body>
