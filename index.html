<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerConnect - Video & Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin-top: 20px; color: #00e5ff; letter-spacing: 1px; }

        .id-box {
            margin-top: 10px; padding: 10px 20px;
            font-size: 14px; border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex; gap: 10px; align-items: center;
        }

        .id-box span { color: #00e5ff; font-weight: bold; }

        .connect-box {
            margin-top: 15px; padding: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px; backdrop-filter: blur(10px);
        }

        input {
            border: none; outline: none; padding: 10px;
            border-radius: 10px; background: rgba(255,255,255,0.2);
            color: white;
        }

        button {
            border: none; padding: 10px 15px;
            border-radius: 10px; background: #00e5ff;
            color: black; cursor: pointer; transition: 0.3s;
            font-weight: bold;
        }

        button:hover { transform: scale(1.05); background: #00b8d4; }

        .videos { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }

        video {
            width: 350px; height: 260px; object-fit: cover;
            border-radius: 20px; background: #000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .controls { margin-top: 15px; }

        .icon-btn {
            width: 55px; height: 55px; border-radius: 50%;
            margin: 5px; font-size: 18px;
            background: rgba(255,255,255,0.1); color: white;
        }

        .icon-btn.end { background: #ff4d4d; }

        .chat {
            margin: 20px 0; width: 350px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px; padding: 15px;
        }

        #messages { height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .me { background: #00e5ff; color: #000; align-self: flex-end; }
        .peer { background: rgba(255,255,255,0.2); color: #fff; align-self: flex-start; }

        .chat-input { display: flex; gap: 5px; margin-top: 10px; }
        .chat-input input { flex: 1; }
    </style>
</head>
<body>

    <h1>PeerConnect</h1>

    <div id="status" style="font-size: 12px; color: #aaa;">Initializing...</div>

    <div class="id-box">
        <i class="fas fa-user"></i>
        <span>ID: <span id="my-id">...</span></span>
        <i class="fas fa-copy" onclick="copyID()" style="cursor:pointer;" title="Copy ID"></i>
    </div>

    <div class="connect-box">
        <input id="peer-id-input" placeholder="Enter Friend ID">
        <button onclick="callPeer()">Connect</button>
    </div>

    <div class="videos">
        <video id="my-video" autoplay muted playsinline></video>
        <video id="peer-video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="toggleAudio(this)"><i class="fas fa-microphone"></i></button>
        <button class="icon-btn" onclick="toggleVideo(this)"><i class="fas fa-video"></i></button>
        <button class="icon-btn end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>

    <div class="chat">
        <div id="messages"></div>
        <div class="chat-input">
            <input id="chat-msg-input" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script src=" js/bootstrap.bundle.min.js">
    </script>
    <script src="js/index.js"></script>
</body>

</html>
