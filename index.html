<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerConnect - Video & Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 
</head>
<body>

    <h1>Servia Video call </h1>

 

    <div class="id-box">
        <i class="fas fa-user"></i>
        <span>ID: <span id="my-id">...</span></span>
        
    </div>

    <div class="connect-box">
        <input id="peer-id-input"  class="text-white" placeholder="Enter Friend ID">
        <button onclick="callPeer()">Connect</button>
    </div>

    <div class="videos">
        <video id="my-video" autoplay muted playsinline></video>
        <video id="peer-video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="toggleAudio(this)"><i class="fas fa-microphone"></i></button>
        <button class="icon-btn" onclick="toggleVideo(this)"><i class="fas fa-video"></i></button>
        <button class="icon-btn end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>



    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script src=" js/bootstrap.bundle.min.js">
    </script>
    <script src="js/index.js"></script>
</body>

</html>
